name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
    schedule:
        - cron: '15 5 * * *'
    push:
        branches:
            - develop
            - main
        # Publish semver tags as releases.
        tags: ['v*.*.*']
    pull_request:
        branches: [main]

env:
    # Use docker.io for Docker Hub if empty
    REGISTRY: ghcr.io
    # github.repository as <account>/<repo>
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            # Login against a Docker registry except on PR
            # https://github.com/docker/login-action
            - name: Log into registry ${{ env.REGISTRY }}
              if: github.event_name != 'pull_request'
              uses: docker/login-action@28fdb31ff34708d19615a74d67103ddc2ea9725c
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Extract metadata (tags, labels) for Docker
            # https://github.com/docker/metadata-action
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@8d8c7c12f7b958582a5cb82ba16d5903cb27976a
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            # Build and push Docker image with Buildx (don't push on PR)
            # https://github.com/docker/build-push-action
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

            - name: Set up QEMU
              if: startsWith(github.ref, 'refs/tags/v')

            - name: Build and push Docker image
              uses: docker/build-push-action@9e436ba9f2d7bcd1d038c8e55d039d37896ddc5d
              with:
                  file: Dockerfile
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
            # Push updated image to bragibooks
            - name: Dispatch to bragibooks
              run: |
                  curl -X POST \
                  -H "Authorization: Bearer ${{secrets.ACCESS_TOKEN}}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  https://api.github.com/repos/djdembeck/bragibooks/actions/workflows/docker-publish.yml/dispatches \
                  -d "{\"ref\": \"${GITHUB_REF##*/}\"}"
