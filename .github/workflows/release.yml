name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build Docker images for'
        required: true
        default: 'v1.0.0'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-binaries:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: m4b-merge-linux
            binary_name: m4b-merge
          - os: macos-latest
            artifact_name: m4b-merge-macos
            binary_name: m4b-merge
          - os: windows-latest
            artifact_name: m4b-merge-windows
            binary_name: m4b-merge.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: cargo build --release --locked

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.binary_name }}

  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: m4b-merge-linux
          path: artifacts/linux/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: m4b-merge-macos
          path: artifacts/macos/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: m4b-merge-windows
          path: artifacts/windows/

      - name: Rename binaries for release
        run: |
          mv artifacts/linux/m4b-merge artifacts/m4b-merge-linux
          mv artifacts/macos/m4b-merge artifacts/m4b-merge-macos
          mv artifacts/windows/m4b-merge.exe artifacts/m4b-merge-windows.exe

      - uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          files: |
            artifacts/m4b-merge-linux
            artifacts/m4b-merge-macos
            artifacts/m4b-merge-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [build-binaries]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG_NAME }}
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: suffix=-${{ matrix.suffix }};latest=false
          tags: |
            type=raw,value=${{ env.TAG_NAME }}
            type=semver,pattern={{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}},value=${{ env.TAG_NAME }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the GHA cache per arch so parallel amd64/arm64 jobs don't
          # collide on the shared cache key.
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max
          platforms: ${{ matrix.platform }}

  docker-manifest:
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.TAG_NAME }}
            type=semver,pattern={{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=semver,pattern={{major}},value=${{ env.TAG_NAME }}
            type=raw,value=latest

      - name: Assemble multi-arch manifest
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # TAGS holds full image refs (ghcr.io/.../m4b-merge:<tag>), one per
          # line. Pass each directly as the manifest target and derive the
          # per-arch sources by appending the -amd64/-arm64 suffixes.
          echo "$TAGS" | while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            [[ "$ref" != *:* ]] && continue
            docker buildx imagetools create -t "$ref" \
              "$ref-amd64" \
              "$ref-arm64"
          done